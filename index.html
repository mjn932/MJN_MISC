<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart.js Interactive Plots with Server Time</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        canvas {
            max-width: 100%;
        }
    </style>
</head>
<body>
    <h1 id='server-time'>Fetching server time...</h1>
    <h2>Interactive Charts from JSON Data</h2>
    <canvas id="myChart"></canvas>
    <script>
        async function fetchServerTime() {
            try {
                const response = await fetch('https://timeapi.io/api/Time/current/zone?timeZone=UTC');
                const data = await response.json();
                const serverTime = new Date(data.dateTime);
                document.getElementById('server-time').innerText = 'Server Time: ' + serverTime.toUTCString();
                console.log("here");
                initializeChart(serverTime);
            } catch (error) {
                console.error('Error fetching server time:', error);
            }
        }

        function initializeChart(startTime) {
            console.log("balh");
            fetch('data.json')
                .then(response => response.json())
                .then(data => {
                    console.log(data);
                    const ctx = document.getElementById('myChart').getContext('2d');
                    
                    // Generate time labels starting from server time
                    const timeLabels = [];
                    for (let i = 0; i < data.datasets[0].y.length; i++) {
                        const timeLabel = new Date(startTime);
                        timeLabel.setMinutes(timeLabel.getMinutes() + i);
                        timeLabels.push(timeLabel.toLocaleTimeString());
                    }
                    
                    const datasets = data.datasets.map((dataset, index) => {
                        const colors = [
                            'rgba(75, 192, 192, 1)',
                            'rgba(255, 99, 132, 1)',
                            'rgba(255, 206, 86, 1)',
                            'rgba(153, 102, 255, 1)',
                            'rgba(255, 159, 64, 1)'
                        ];
                        return {
                            label: dataset.label,
                            data: dataset.y,
                            borderColor: colors[index % colors.length],
                            backgroundColor: colors[index % colors.length].replace('1)', '0.1)'),
                            borderWidth: 2,
                            tension: 0.1
                        };
                    });
                    
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: timeLabels,
                            datasets: datasets
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    position: 'top',
                                },
                                title: {
                                    display: true,
                                    text: 'Data Visualization with Server Time'
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true
                                }
                            }
                        }
                    });
                })
                .catch(error => console.error('Error fetching data:', error));
        }

        window.onload = fetchServerTime;
    </script>
</body>
</html>
